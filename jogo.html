<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokéGuess - Jogo</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header>
      <h1>PokéGuess</h1>

      <nav>
        <a href="index.html">Início</a>
        <a href="jogo.html">Jogo</a>
        <a href="sobre.html">Sobre</a>
        <a href="ranking.html">Ranking</a>
        <a href="pokedex.html">Pokédex</a>
        <a href="faq.html">FAQ</a>
        <a href="privacidade.html">Privacidade</a>
      </nav>
    </header>

    <main class="container">
      <h2>Definições</h2>

      <form>
        <label>Nome do Jogador</label><br />
        <input type="text" id="nomeJogador" required />

        <br /><br />

        <label>Dificuldade</label><br />

        <select id="dificuldade">
          <option value="151">Fácil</option>
          <option value="251">Médio</option>
          <option value="1025">Difícil</option>
        </select>

        <br /><br />

        <h3>Modo de Jogo</h3>

        <select id="modo">
          <option value="silhueta">Silhueta</option>
          <option value="estatisticas">Estatísticas</option>
          <option value="tipo">Tipo + Geração</option>
          <option value="evolucao">Cadeia Evolutiva</option>
          <option value="aleatorio">Aleatório</option>
        </select>

        <br /><br />

        <button type="button" id="btnGuardar">Guardar</button>
      </form>

      <hr />
      <br />

      <section class="jogo">
        <h2>Adivinha o Pokémon</h2>

        <div class="info-jogo">
          <p><strong>Vidas:</strong> <span id="vidas">3</span></p>
          <p><strong>Pontos:</strong> <span id="pontos">0</span></p>
          <p><strong>Tempo:</strong> <span id="tempo">30</span></p>
        </div>

        <p id="infoModo"></p>

        <img id="pokemon" src="" alt="Pokemon" />

        <p id="pista"></p>

        <div id="opcoes"></div>

        <div class="formulario">
          <input type="text" id="resposta" placeholder="Nome do Pokémon" />

          <br /><br />

          <button type="button" id="btnResponder">Responder</button>

          <button type="button" id="btnPista">Pista</button>
        </div>

        <br />

        <p id="mensagem"></p>
      </section>

      <hr />
      <br />

      <h2>Histórico</h2>

      <table border="1">
        <tr>
          <th>Jogador</th>
          <th>Pontos</th>
        </tr>

        <tbody id="historico"></tbody>
      </table>

      <br />

      <button type="button" id="btnCSV">Exportar CSV</button>
    </main>

    <footer>
      <p>PokéGuess - Trabalho DW</p>
    </footer>

    <script src="js/jogo.js"></script>
  </body>
</html>
