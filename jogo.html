<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokéGuess - Jogo</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header>
      <h1>PokéGuess</h1>

      <nav>
        <a href="index.html">Início</a>
        <a href="jogo.html">Jogo</a>
        <a href="sobre.html">Sobre</a>
        <a href="ranking.html">Ranking</a>
        <a href="pokedex.html">Pokédex</a>
        <a href="faq.html">FAQ</a>
      </nav>
    </header>

    <main class="container">
      <section class="jogo">
        <h2>Adivinha o Pokémon</h2>

        <div class="info-jogo">
          <p><strong>Vidas:</strong> <span id="vidas">3</span></p>
          <p><strong>Pontos:</strong> <span id="pontos">0</span></p>
          <p><strong>Tempo:</strong> <span id="tempo">30</span></p>
        </div>

        <img id="pokemon" src="" alt="Pokemon" />

        <div class="formulario">
          <input type="text" id="resposta" placeholder="Nome do Pokémon" />

          <br /><br />

          <button id="btnResponder">Responder</button>

          <button id="btnPista">Pista</button>
        </div>

        <br />

        <p id="mensagem"></p>
      </section>
    </main>

    <footer>
      <p>PokéGuess - Trabalho DW</p>
    </footer>

    <script src="js/jogo.js"></script>
  </body>
</html>
